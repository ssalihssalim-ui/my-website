<!DOCTYPE html>
<html>
<head>
  <title>Minimarket System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 230px;
      background: #1e272e;
      color: white;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      text-align: center;
      padding: 15px;
      border-bottom: 1px solid #444;
    }

    .sidebar button {
      background: none;
      border: none;
      color: white;
      padding: 15px;
      text-align: left;
      cursor: pointer;
      width: 100%;
      font-size: 15px;
    }

    .sidebar button:hover {
      background: #485460;
    }

    /* Content */
    .content {
      flex: 1;
      padding: 20px;
      background: #f1f2f6;
      overflow-y: auto;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
    }

    /* Mobile */
    @media(max-width: 768px){
      body {
        flex-direction: column;
      }
      .sidebar {
        width: 100%;
        flex-direction: row;
        overflow-x: auto;
      }
      .sidebar button {
        flex: 1;
        text-align: center;
        font-size: 12px;
        padding: 10px;
      }
    }
  </style>
</head>

<body>

  <!-- Sidebar Menu -->
  <div class="sidebar">
    <h2>Minimarket</h2>
    <button onclick="showSection('home')">🏠 Home</button>
    <button onclick="showSection('pos')">🛒 POS</button>
    <button onclick="showSection('categories')">🗂 Categories</button>
    <button onclick="showSection('products')">📦 Products</button>
    <button onclick="showSection('clients')">👥 Clients</button>
    <button onclick="showSection('suppliers')">🚚 Suppliers</button>
    <button onclick="showSection('statistics')">📊 Statistics</button>
    <button onclick="showSection('credits')">💳 Credits</button>
  </div>

  <!-- Main Content -->
  <div class="content" id="contentArea">
    <h1>Welcome to Minimarket System</h1>
    <div class="card">Select a menu item to manage your system.</div>
  </div>

  <script>
    function showSection(section) {
      const content = document.getElementById("contentArea");

      if(section === "home"){
        content.innerHTML = `
          <h1>Dashboard</h1>
          <div class="card">Total Sales Today: $350</div>
          <div class="card">Total Products: 120</div>
          <div class="card">Total Clients: 45</div>
        `;
      }

      if(section === "pos"){
        content.innerHTML = `
          <h1>Point of Sale (POS)</h1>
          <div class="card">Cashier System Coming Soon...</div>
        `;
      }

      if(section === "categories"){
        content.innerHTML = `
          <h1>Categories</h1>
          <div class="card">Vegetables</div>
          <div class="card">Drinks</div>
          <div class="card">Bakery</div>
        `;
      }

      if(section === "products"){
        content.innerHTML = `
          <h1>Products</h1>
          <div class="card">Milk - $2</div>
          <div class="card">Bread - $1.5</div>
          <div class="card">Cola - $3</div>
        `;
      }

      if(section === "clients"){
        content.innerHTML = `
          <h1>Clients</h1>
          <div class="card">Client A</div>
          <div class="card">Client B</div>
        `;
      }

      if(section === "suppliers"){
        content.innerHTML = `
          <h1>Suppliers</h1>
          <div class="card">Supplier 1</div>
          <div class="card">Supplier 2</div>
        `;
      }

      if(section === "statistics"){
        content.innerHTML = `
          <h1>Statistics</h1>
          <div class="card">Monthly Sales: $8,200</div>
          <div class="card">Best Product: Milk</div>
        `;
      }

      if(section === "credits"){
        content.innerHTML = `
          <h1>Credits</h1>
          <div class="card">Total Credit Given: $1,200</div>
          <div class="card">Pending Payments: $450</div>
        `;
      }
    }
  </script>

</body>
</html>
