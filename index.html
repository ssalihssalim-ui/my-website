<!DOCTYPE html>
<html>
<head>
  <title>Minimarket System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Toggle Button -->
  <button class="menu-toggle" onclick="toggleMenu()">☰</button>

  <!-- Overlay -->
  <div class="overlay" onclick="closeMenu()"></div>

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <h2>Minimarket</h2>
    <button onclick="showSection('home')">Home</button>
    <button onclick="showSection('pos')">POS</button>
    <button onclick="showSection('categories')">Categories</button>
    <button onclick="showSection('products')">Products</button>
    <button onclick="showSection('clients')">Clients</button>
    <button onclick="showSection('suppliers')">Suppliers</button>
    <button onclick="showSection('statistics')">Statistics</button>
    <button onclick="showSection('credits')">Credits</button>
  </div>

  <!-- Content -->
  <div class="content" id="contentArea">
    <h1>Welcome</h1>
    <div class="card">Select a menu item.</div>
  </div>

  <script src="script.js"></script>

</body>
</html>
